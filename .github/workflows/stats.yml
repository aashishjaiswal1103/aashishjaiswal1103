name: Generate GitHub Stats

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: jstrieb/github-stats@master
        with:
          username: aashishjaiswal1103
          exclude_repos: ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
