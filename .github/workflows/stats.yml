name: Generate GitHub Stats

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Generate stats images
        uses: jstrieb/github-stats@master
        with:
          username: aashishjaiswal1103
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
